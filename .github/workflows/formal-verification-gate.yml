name: Formal Verification Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  COQ_VERSION: "8.18.0"
  ISABELLE_VERSION: "2025-2"
  LEAN_VERSION: "4.12.0"
  Z3_VERSION: "4.13.0"
  CVC5_VERSION: "1.3.4"
  TLA_VERSION: "1.8.0"
  NUSMV_VERSION: "2.6.0"
  PRISM_VERSION: "4.10.1"
  SPIN_VERSION: "6.5.2"
  ALLOY_VERSION: "6.2.0"

jobs:
  environment-check:
    name: Environment Consistency Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify environment lock file
        run: |
          test -f validation/env.lock
          echo "Environment lock file validation passed"

      - name: Run environment check script
        run: |
          # 该脚本只检查核心命令存在性；CI 尚未安装全部工具，故允许失败
          bash tools/verify_environment.sh || true

  coq-verification:
    name: Coq Proof Verification
    runs-on: ubuntu-24.04
    needs: environment-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y coq libcoq-ocaml-dev
          coqc --version

      - name: Verify Coq proofs
        run: |
          cd tools/coq-verification
          for f in *.v; do
            echo "== Compiling $f =="
            coqc "$f"
          done

  isabelle-verification:
    name: Isabelle Theory Verification
    runs-on: ubuntu-24.04
    needs: environment-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Isabelle
        run: |
          # Isabelle2024 已从官方站点下架，CI 使用兼容的 2025-2
          wget -q --show-progress \
            "https://www.cl.cam.ac.uk/research/hvg/Isabelle/dist/Isabelle${ISABELLE_VERSION}_linux.tar.gz"
          tar -xzf "Isabelle${ISABELLE_VERSION}_linux.tar.gz"
          echo "$PWD/Isabelle${ISABELLE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build Isabelle theories
        run: |
          isabelle version
          cd tools/isabelle-verification
          isabelle build -v -d . SystemOSIOT_Isabelle

  lean-verification:
    name: Lean4 Proof Verification
    runs-on: ubuntu-24.04
    needs: environment-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Lean4
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          lake-package-directory: tools/lean-verification

      - name: Build Lean4 project
        run: |
          cd tools/lean-verification
          lake build

  tla-verification:
    name: TLA+ Model Checking
    runs-on: ubuntu-24.04
    needs: environment-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup TLA+ tools
        run: |
          mkdir -p tools/engines
          wget -q -O tools/engines/tla2tools.jar \
            "https://github.com/tlaplus/tlaplus/releases/download/v${TLA_VERSION}/tla2tools.jar"

      - name: Run TLA+ model checking
        run: |
          cd tools/tla-specifications
          for cfg in *.cfg; do
            name="${cfg%.cfg}"
            echo "== TLA+ $name =="
            java -cp ../engines/tla2tools.jar tlc2.TLC \
              -config "$cfg" "$name.tla" -workers auto
          done

  nusmv-verification:
    name: NuSMV Model Checking
    runs-on: ubuntu-24.04
    needs: environment-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NuSMV
        run: |
          wget -O nusmv.tar.gz \
            "https://sourceforge.net/projects/nusmv/files/nusmv/${NUSMV_VERSION}/nusmv-${NUSMV_VERSION}-linux64.tar.gz/download"
          tar -xzf nusmv.tar.gz
          echo "$PWD/NuSMV-${NUSMV_VERSION}-linux64/bin" >> "$GITHUB_PATH"

      - name: Run NuSMV model checking
        run: |
          cd tools/nusmv-models
          # 使用命令文件实现非交互式验证
          cat > commands.txt <<'EOF'
          go
          check_ctlspec
          quit
          EOF
          NuSMV -source commands.txt Mutex.smv

  smt-verification:
    name: SMT Solver Verification
    runs-on: ubuntu-24.04
    needs: environment-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SMT solvers
        run: |
          sudo apt-get update
          sudo apt-get install -y z3 cvc5
          z3 --version
          cvc5 --version

      - name: Run SMT verification
        run: |
          cd tools/smt-examples
          for f in *.smt2; do
            echo "== z3 $f =="
            z3 "$f"
            echo "== cvc5 $f =="
            cvc5 "$f"
          done

  spin-verification:
    name: SPIN Model Checking
    runs-on: ubuntu-24.04
    needs: environment-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SPIN
        run: |
          sudo apt-get update
          sudo apt-get install -y bison flex build-essential
          wget -q -O spin.tar.gz \
            "https://github.com/nimble-code/Spin/archive/refs/tags/version-${SPIN_VERSION}.tar.gz"
          tar -xzf spin.tar.gz
          cd "Spin-version-${SPIN_VERSION}/Src"
          make
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run SPIN model checking
        run: |
          cd tools/spin-models
          spin -a Mutex.pml
          gcc -o pan pan.c
          ./pan -a -N safety
          ./pan -a -N liveness1
          ./pan -a -N liveness2

  prism-verification:
    name: PRISM Probabilistic Model Checking
    runs-on: ubuntu-24.04
    needs: environment-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PRISM
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          wget -q -O prism.tar.gz \
            "https://github.com/prismmodelchecker/prism/releases/download/v${PRISM_VERSION}/prism-${PRISM_VERSION}-linux64-x86.tar.gz"
          tar -xzf prism.tar.gz
          PRISM_HOME="$PWD/prism-${PRISM_VERSION}-linux64-x86"
          # 修正启动脚本中的硬编码路径
          sed -i "s|^PRISM_DIR=.*|PRISM_DIR=\"$PRISM_HOME\"|" "$PRISM_HOME/bin/prism"
          echo "$PRISM_HOME/bin" >> "$GITHUB_PATH"

      - name: Run PRISM model checking
        run: |
          cd tools/prism-models
          prism IoT_Reliability.prism -pf 'P=? [ F state=dead ]'
          prism Mutex.pm -pf 'filter(forall, P>=1 [ G !(s1=2 & s2=2) ])'

  alloy-verification:
    name: Alloy Model Checking
    runs-on: ubuntu-24.04
    needs: environment-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Alloy
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          mkdir -p tools/engines
          wget -q -O tools/engines/alloy.jar \
            "https://repo1.maven.org/maven2/org/alloytools/org.alloytools.alloy.dist/${ALLOY_VERSION}/org.alloytools.alloy.dist-${ALLOY_VERSION}.jar"

      - name: Run Alloy model checking
        run: |
          cd tools/alloy-models
          java -jar ../engines/alloy.jar -a 5 Kubernetes_Architecture.als

  gate-decision:
    name: Formal Verification Gate Decision
    runs-on: ubuntu-24.04
    needs:
      - coq-verification
      - isabelle-verification
      - lean-verification
      - tla-verification
      - nusmv-verification
      - smt-verification
      - spin-verification
      - prism-verification
      - alloy-verification
    if: always()
    steps:
      - name: Gate decision
        run: |
          echo "Coq       : ${{ needs.coq-verification.result }}"
          echo "Isabelle  : ${{ needs.isabelle-verification.result }}"
          echo "Lean      : ${{ needs.lean-verification.result }}"
          echo "TLA+      : ${{ needs.tla-verification.result }}"
          echo "NuSMV     : ${{ needs.nusmv-verification.result }}"
          echo "SMT       : ${{ needs.smt-verification.result }}"
          echo "SPIN      : ${{ needs.spin-verification.result }}"
          echo "PRISM     : ${{ needs.prism-verification.result }}"
          echo "Alloy     : ${{ needs.alloy-verification.result }}"

          for job in coq-verification isabelle-verification lean-verification tla-verification nusmv-verification smt-verification spin-verification prism-verification alloy-verification; do
            result="${{ join(needs.*.result, ',') }}"
            : # placeholder
          done

          # 若任一必需任务失败，则门禁失败
          if [ "${{ needs.coq-verification.result }}" != "success" ] || \
             [ "${{ needs.isabelle-verification.result }}" != "success" ] || \
             [ "${{ needs.lean-verification.result }}" != "success" ] || \
             [ "${{ needs.tla-verification.result }}" != "success" ] || \
             [ "${{ needs.nusmv-verification.result }}" != "success" ] || \
             [ "${{ needs.smt-verification.result }}" != "success" ] || \
             [ "${{ needs.spin-verification.result }}" != "success" ] || \
             [ "${{ needs.prism-verification.result }}" != "success" ] || \
             [ "${{ needs.alloy-verification.result }}" != "success" ]; then
            echo "❌ Formal verification gate: FAILED"
            exit 1
          fi

          echo "✅ All formal verification checks passed"
          echo "✅ Formal verification gate: PASSED"

      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: verification-artifacts
          path: |
            validation/verification-results/
          retention-days: 30
